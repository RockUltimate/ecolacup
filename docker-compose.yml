services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecolacup-app
    ports:
      - "8086:80"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8086
      APP_NAME: Ecolakoně
      APP_LOCALE: cs
      APP_FALLBACK_LOCALE: cs
      APP_FAKER_LOCALE: cs_CZ
      APP_TIMEZONE: Europe/Prague
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ecolacup
      DB_USERNAME: ecolacup
      DB_PASSWORD: ecolacup
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: dev@localhost
      MAIL_FROM_NAME: Ecolakoně
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecolacup-queue
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=60"]
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8086
      APP_NAME: Ecolakoně
      APP_LOCALE: cs
      APP_FALLBACK_LOCALE: cs
      APP_FAKER_LOCALE: cs_CZ
      APP_TIMEZONE: Europe/Prague
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ecolacup
      DB_USERNAME: ecolacup
      DB_PASSWORD: ecolacup
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: dev@localhost
      MAIL_FROM_NAME: Ecolakoně
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ecolacup-postgres
    environment:
      POSTGRES_DB: ecolacup
      POSTGRES_USER: ecolacup
      POSTGRES_PASSWORD: ecolacup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecolacup -d ecolacup"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
