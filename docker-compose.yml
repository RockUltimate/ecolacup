services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecolacup-app
    ports:
      - "8086:80"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://ecolakone.cz
      APP_NAME: Ecolakoně
      APP_LOCALE: cs
      APP_FALLBACK_LOCALE: cs
      APP_FAKER_LOCALE: cs_CZ
      APP_TIMEZONE: Europe/Prague
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ecolacup
      DB_USERNAME: ecolacup
      DB_PASSWORD: ecolacup
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.seznam.cz
      MAIL_PORT: 465
      MAIL_ENCRYPTION: ssl
      MAIL_USERNAME: ecola@ecolakone.cz
      MAIL_PASSWORD: Haklak2006
      MAIL_FROM_ADDRESS: ecola@ecolakone.cz
      MAIL_FROM_NAME: Ecolakoně
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecolacup-queue
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=60"]
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: https://ecolakone.cz
      APP_NAME: Ecolakoně
      APP_LOCALE: cs
      APP_FALLBACK_LOCALE: cs
      APP_FAKER_LOCALE: cs_CZ
      APP_TIMEZONE: Europe/Prague
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ecolacup
      DB_USERNAME: ecolacup
      DB_PASSWORD: ecolacup
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.seznam.cz
      MAIL_PORT: 465
      MAIL_ENCRYPTION: ssl
      MAIL_USERNAME: ecola@ecolakone.cz
      MAIL_PASSWORD: Haklak2006
      MAIL_FROM_ADDRESS: ecola@ecolakone.cz
      MAIL_FROM_NAME: Ecolakoně
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ecolacup-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: eyJhIjoiZjdhMTM3ZWYyMGY2OTcxNDE2YTc0NjE5ZWVhMDk3MDQiLCJ0IjoiMzdjMmE2MDItYTBlOC00MzdmLThjOWYtYTg5YTY1YTFiYTlmIiwicyI6Ik9HRXpaREkzTVRZdFpEUmxNaTAwTmpCbExUazNOamd0TVRFeU9XWTVOall4T1dNeSJ9
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ecolacup-postgres
    environment:
      POSTGRES_DB: ecolacup
      POSTGRES_USER: ecolacup
      POSTGRES_PASSWORD: ecolacup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecolacup -d ecolacup"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
