services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecolacup-app
    ports:
      - "8086:80"
    volumes:
      - storage_data:/var/www/html/storage/app/public
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8086
      DB_HOST: postgres
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecolacup-queue
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=60"]
    volumes:
      - storage_data:/var/www/html/storage/app/public
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8086
      DB_HOST: postgres
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ecolacup-postgres
    environment:
      POSTGRES_DB: ecolacup
      POSTGRES_USER: ecolacup
      POSTGRES_PASSWORD: ecolacup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecolacup -d ecolacup"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
  storage_data:
